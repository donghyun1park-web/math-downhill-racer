<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 285" role="img" aria-labelledby="title">
  <title id="title">Jumping downhill MTB rider with helmet goggles raised front wheel handlebar frame and grill turbo</title>
  <g id="bike" transform="rotate(-10 196 174)" stroke-linecap="round" stroke-linejoin="round">
    <ellipse id="rear-wheel" cx="88" cy="208" rx="50" ry="43" fill="none" stroke="#07111f" stroke-width="18"/>
    <ellipse id="front-wheel" cx="276" cy="169" rx="59" ry="48" fill="none" stroke="#07111f" stroke-width="18"/>
    <path id="frame" d="M88 208l72-96 82 57H88l48-8 24-49 22 74" fill="none" stroke="#f6fbff" stroke-width="11"/>
    <path id="fork" d="M242 169l38-99M265 171l39-94" fill="none" stroke="#35d4ff" stroke-width="10"/>
    <path id="handlebar" d="M301 75l34-21M299 75l-40 7" fill="none" stroke="#f6fbff" stroke-width="9"/>
  </g>
  <g id="rider-body" transform="rotate(-8 190 120)">
    <path id="knee-pad" d="M152 126l-58 77M176 130l71 42" fill="none" stroke="#f6fbff" stroke-width="18" stroke-linecap="round"/>
    <path d="M121 82c35-27 89-19 116 13l-32 48c-32-8-65-22-94-45z" fill="#10243a" stroke="#dff8ff" stroke-width="4"/>
    <path d="M132 84l78 48" stroke="#ff7a18" stroke-width="14"/>
    <path d="M205 101l85-27M137 100l-52 51" fill="none" stroke="#f6fbff" stroke-width="15" stroke-linecap="round"/>
    <g id="helmet">
      <path d="M101 50c27-32 82-25 97 9 2 18-13 35-39 37l-48-9c-17-8-20-24-10-37z" fill="#f6fbff" stroke="#07111f" stroke-width="6"/>
      <path id="goggles" d="M114 62l62 8-10 17-58-8z" fill="#07111f"/>
    </g>
    <g id="grill-turbo">
      <rect x="210" y="62" width="52" height="42" rx="8" fill="#ff7a18" stroke="#07111f" stroke-width="5"/>
      <circle cx="236" cy="83" r="16" fill="#07111f" stroke="#ffcf54" stroke-width="5"/>
    </g>
  </g>
</svg>
