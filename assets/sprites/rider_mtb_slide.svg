<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260" role="img" aria-labelledby="title">
  <title id="title">Sliding downhill MTB rider with twisted bike helmet handlebar frame wheels and grill turbo</title>
  <g id="bike" transform="rotate(13 188 180)" stroke-linecap="round" stroke-linejoin="round">
    <ellipse id="rear-wheel" cx="92" cy="198" rx="54" ry="40" fill="none" stroke="#07111f" stroke-width="18"/>
    <ellipse id="front-wheel" cx="282" cy="188" rx="60" ry="42" fill="none" stroke="#07111f" stroke-width="18"/>
    <path id="frame" d="M92 198l72-82 78 70H92l49-8 23-62 24 70" fill="none" stroke="#f6fbff" stroke-width="11"/>
    <path id="fork" d="M244 188l36-95M268 190l39-92" fill="none" stroke="#35d4ff" stroke-width="10"/>
    <path id="handlebar" d="M304 96l36 3M300 96l-40 18" fill="none" stroke="#f6fbff" stroke-width="9"/>
  </g>
  <g id="rider-body" transform="rotate(8 185 118)">
    <path id="knee-pad" d="M151 130l-54 65M179 134l70 38" fill="none" stroke="#f6fbff" stroke-width="18" stroke-linecap="round"/>
    <path d="M122 82c36-26 88-17 113 13l-31 48c-33-8-65-19-94-44z" fill="#10243a" stroke="#dff8ff" stroke-width="4"/>
    <path d="M132 86l81 46" stroke="#ff7a18" stroke-width="14"/>
    <path d="M204 101l87-6M137 101l-58 39" fill="none" stroke="#f6fbff" stroke-width="15" stroke-linecap="round"/>
    <g id="helmet">
      <path d="M102 49c28-31 82-24 97 9 2 18-13 35-39 36l-49-8c-17-8-19-23-9-37z" fill="#f6fbff" stroke="#07111f" stroke-width="6"/>
      <path id="goggles" d="M115 61l62 8-10 17-58-7z" fill="#07111f"/>
    </g>
    <g id="grill-turbo">
      <rect x="211" y="61" width="52" height="42" rx="8" fill="#ff7a18" stroke="#07111f" stroke-width="5"/>
      <circle cx="237" cy="82" r="16" fill="#07111f" stroke="#ffcf54" stroke-width="5"/>
    </g>
  </g>
  <path d="M26 224c72 14 155 14 272 2" stroke="#9ee7ff" stroke-width="5" opacity=".55" stroke-linecap="round"/>
</svg>
