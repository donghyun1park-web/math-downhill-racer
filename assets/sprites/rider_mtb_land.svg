    <path id="frame" d="M88 184l72-62 76 62H88l48-5 24-57 22 62" fill="none" stroke="#f6fbff" stroke-width="12"/>
    <path id="fork" d="M238 184l28-78M262 184l30-78" fill="none" stroke="#35d4ff" stroke-width="11"/>
